name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  # APK smoke-test removed: isar_flutter_libs 3.x does not declare a namespace
  # in its android/build.gradle, which AGP 8.x (used by Flutter 3.41) requires.
  # Re-add this job once Isar 4 ships (same upgrade that unblocks Riverpod 3).
